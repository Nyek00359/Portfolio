<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Creative Developer Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00f0ff;
            --secondary: #ff00aa;
            --accent: #00ff88;
            --dark: #0a0a0f;
            --darker: #050508;
            --glow-primary: rgba(0, 240, 255, 0.5);
            --glow-secondary: rgba(255, 0, 170, 0.5);
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--darker);
            color: #fff;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Cyberpunk Background */
        .cyber-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                linear-gradient(180deg, transparent 0%, rgba(0, 240, 255, 0.03) 50%, transparent 100%),
                linear-gradient(90deg, transparent 0%, rgba(255, 0, 170, 0.02) 50%, transparent 100%),
                var(--darker);
        }

        /* Grid Lines */
        .grid-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(var(--glow-primary) 1px, transparent 1px),
                linear-gradient(90deg, var(--glow-primary) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.1;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(50px); }
        }

        /* Floating Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--primary);
            border-radius: 50%;
            animation: float 15s infinite;
            opacity: 0.6;
        }

        .particle:nth-child(2) { left: 20%; animation-delay: -2s; background: var(--secondary); }
        .particle:nth-child(3) { left: 40%; animation-delay: -4s; }
        .particle:nth-child(4) { left: 60%; animation-delay: -6s; background: var(--accent); }
        .particle:nth-child(5) { left: 80%; animation-delay: -8s; background: var(--secondary); }
        .particle:nth-child(6) { left: 10%; animation-delay: -10s; background: var(--accent); }
        .particle:nth-child(7) { left: 30%; animation-delay: -12s; }
        .particle:nth-child(8) { left: 50%; animation-delay: -14s; background: var(--secondary); }
        .particle:nth-child(9) { left: 70%; animation-delay: -1s; background: var(--accent); }
        .particle:nth-child(10) { left: 90%; animation-delay: -3s; }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
                transform: translateY(90vh) scale(1);
            }
            90% {
                opacity: 0.8;
                transform: translateY(10vh) scale(1);
            }
            100% {
                transform: translateY(-10vh) scale(0);
                opacity: 0;
            }
        }

        /* Main Container */
        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            position: relative;
        }

        /* Glitch Title */
        .glitch-container {
            position: relative;
            margin-bottom: 1rem;
        }

        .glitch-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            position: relative;
            animation: glitchText 3s infinite;
        }

        .glitch-title::before,
        .glitch-title::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .glitch-title::before {
            color: var(--primary);
            animation: glitch1 2s infinite;
            clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
        }

        .glitch-title::after {
            color: var(--secondary);
            animation: glitch2 2s infinite;
            clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%);
        }

        @keyframes glitchText {
            0%, 90%, 100% { opacity: 1; }
            91% { opacity: 0.8; }
            92% { opacity: 1; }
            93% { opacity: 0.7; }
            94% { opacity: 1; }
        }

        @keyframes glitch1 {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-3px, 3px); }
            40% { transform: translate(-3px, -3px); }
            60% { transform: translate(3px, 3px); }
            80% { transform: translate(3px, -3px); }
        }

        @keyframes glitch2 {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(3px, -3px); }
            40% { transform: translate(3px, 3px); }
            60% { transform: translate(-3px, -3px); }
            80% { transform: translate(-3px, 3px); }
        }

        /* Subtitle */
        .subtitle {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: var(--primary);
            letter-spacing: 0.5em;
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeInUp 1s ease forwards 0.5s;
        }

        /* Typing Effect */
        .typing-container {
            font-size: clamp(1rem, 2.5vw, 1.3rem);
            margin-bottom: 3rem;
            height: 2rem;
            overflow: hidden;
        }

        .typing-text {
            display: inline;
            border-right: 2px solid var(--accent);
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            0%, 50% { border-color: var(--accent); }
            51%, 100% { border-color: transparent; }
        }

        /* Scan Line */
        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            animation: scan 4s linear infinite;
            opacity: 0.3;
        }

        @keyframes scan {
            0% { top: -2px; }
            100% { top: 100%; }
        }

        /* Enter Button */
        .enter-btn {
            position: relative;
            padding: 1rem 3rem;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--primary);
            background: transparent;
            border: 2px solid var(--primary);
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s ease;
            opacity: 0;
            animation: fadeInUp 1s ease forwards 1.5s;
            text-decoration: none;
            display: inline-block;
        }

        .enter-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, var(--glow-primary), transparent);
            transition: left 0.5s ease;
        }

        .enter-btn:hover {
            background: var(--primary);
            color: var(--dark);
            box-shadow: 0 0 30px var(--glow-primary), inset 0 0 30px rgba(0, 240, 255, 0.1);
        }

        .enter-btn:hover::before {
            left: 100%;
        }

        /* Corner Decorations */
        .corner {
            position: fixed;
            width: 100px;
            height: 100px;
            border: 2px solid var(--primary);
            opacity: 0.5;
        }

        .corner-tl { top: 20px; left: 20px; border-right: none; border-bottom: none; }
        .corner-tr { top: 20px; right: 20px; border-left: none; border-bottom: none; }
        .corner-bl { bottom: 20px; left: 20px; border-right: none; border-top: none; }
        .corner-br { bottom: 20px; right: 20px; border-left: none; border-top: none; }

        /* Cyber Orb */
        .cyber-orb {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: orbFloat 10s ease-in-out infinite;
        }

        .orb-1 {
            top: 10%;
            left: 10%;
            background: var(--primary);
        }

        .orb-2 {
            bottom: 10%;
            right: 10%;
            background: var(--secondary);
            animation-delay: -5s;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(30px, -30px); }
            50% { transform: translate(-20px, 20px); }
            75% { transform: translate(20px, 30px); }
        }

        /* Loading Bar */
        .loading-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
            width: 0%;
            animation: loadBar 2s ease forwards;
        }

        @keyframes loadBar {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        /* Fade Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .corner { width: 50px; height: 50px; }
            .subtitle { letter-spacing: 0.2em; }
            .enter-btn { padding: 0.8rem 2rem; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <!-- Background Effects -->
    <div class="cyber-bg"></div>
    <div class="grid-lines"></div>
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>
    <div class="cyber-orb orb-1"></div>
    <div class="cyber-orb orb-2"></div>
    <div class="scan-line"></div>
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <!-- Main Content -->
    <div class="container">
        <div class="glitch-container">
            <h1 class="glitch-title" data-text="WELCOME">WELCOME</h1>
        </div>
        <p class="subtitle">CREATIVE DEVELOPER</p>
        
        <div class="typing-container">
            <span class="typing-text" id="typing"></span>
        </div>

        <a href="pages/index.html" class="enter-btn">
            Enter Portfolio
        </a>
    </div>

    <div class="loading-bar"></div>

    <script>
        // Typing Effect
        const text = "Crafting Digital Experiences";
        const typingElement = document.getElementById('typing');
        let index = 0;

        function type() {
            if (index < text.length) {
                typingElement.textContent += text.charAt(index);
                index++;
                setTimeout(type, 100);
            } else {
                setTimeout(() => {
                    typingElement.textContent = '';
                    index = 0;
                    type();
                }, 2000);
            }
        }

        // Start typing after animations
        setTimeout(type, 1200);

        // Remove loading bar after animation
        setTimeout(() => {
            document.querySelector('.loading-bar').style.opacity = '0';
        }, 2500);
    </script>
</body>
</html>
