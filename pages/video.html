<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio - Video Editing</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/video.css">
</head>
<body>
    <!-- Main Content -->
    <main class="main-content">
        <!-- VIDEO EDITING SECTION - Showcase Theme -->
        <section class="tab-content active" id="video">
            <div class="video-section">
                <h2 class="section-title">Video Editing Portfolio</h2>
                <div class="showcase-grid">
                    <div class="showcase-item large">
                        <div class="showcase-bg video-1">
                            <i class="fas fa-film showcase-icon"></i>
                        </div>
                        <div class="showcase-content">
                            <h3>Featured Project</h3>
                            <p>Commercial Video - Brand Story</p>
                        </div>
                    </div>
                    <div class="showcase-item">
                        <div class="showcase-bg video-2">
                            <i class="fas fa-play-circle showcase-icon"></i>
                        </div>
                        <div class="showcase-content">
                            <h3>Music Video</h3>
                            <p>Color Grading Demo</p>
                        </div>
                    </div>
                    <div class="showcase-item">
                        <div class="showcase-bg video-3">
                            <i class="fas fa-video showcase-icon"></i>
                        </div>
                        <div class="showcase-content">
                            <h3>Documentary</h3>
                            <p>Post-Production Work</p>
                        </div>
                    </div>
                    <div class="showcase-item wide">
                        <div class="showcase-bg video-4">
                            <i class="fas fa-clapperboard showcase-icon"></i>
                        </div>
                        <div class="showcase-content">
                            <h3>Film Production</h3>
                            <p>Visual Effects & Motion Graphics</p>
                        </div>
                    </div>
                    <div class="showcase-item">
                        <div class="showcase-bg video-5">
                            <i class="fas fa-broadcast-tower showcase-icon"></i>
                        </div>
                        <div class="showcase-content">
                            <h3>TV Commercial</h3>
                            <p>Broadcast Quality</p>
                        </div>
                    </div>
                    <div class="showcase-item">
                        <div class="showcase-bg video-6">
                            <i class="fas fa-wave-square showcase-icon"></i>
                        </div>
                        <div class="showcase-content">
                            <h3>Motion Graphics</h3>
                            <p>Animation Work</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="../js/components.js"></script>
    <script src="../js/script.js"></script>
</body>
</html>
