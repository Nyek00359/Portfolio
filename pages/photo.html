<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio - Photo Editing</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/photo.css">
</head>
<body>
    <!-- Main Content -->
    <main class="main-content">
        <!-- PHOTO EDITING SECTION - Bento Theme -->
        <section class="tab-content active" id="photo">
            <div class="photo-section">
                <h2 class="section-title">Photo Editing Portfolio</h2>
                <div class="bento-grid">
                    <div class="bento-item large">
                        <div class="bento-bg photo-1">
                            <i class="fas fa-image"></i>
                        </div>
                        <span class="bento-label">Portrait Retouching</span>
                    </div>
                    <div class="bento-item">
                        <div class="bento-bg photo-2">
                            <i class="fas fa-magic"></i>
                        </div>
                        <span class="bento-label">Color Grading</span>
                    </div>
                    <div class="bento-item tall">
                        <div class="bento-bg photo-3">
                            <i class="fas fa-crop-alt"></i>
                        </div>
                        <span class="bento-label">Photo Manipulation</span>
                    </div>
                    <div class="bento-item">
                        <div class="bento-bg photo-4">
                            <i class="fas fa-eye"></i>
                        </div>
                        <span class="bento-label">Background Remove</span>
                    </div>
                    <div class="bento-item">
                        <div class="bento-bg photo-5">
                            <i class="fas fa-sun"></i>
                        </div>
                        <span class="bento-label">Lighting Adjust</span>
                    </div>
                    <div class="bento-item">
                        <div class="bento-bg photo-6">
                            <i class="fas fa-layer-group"></i>
                        </div>
                        <span class="bento-label">Composite</span>
                    </div>
                    <div class="bento-item">
                        <div class="bento-bg photo-7">
                            <i class="fas fa-portrait"></i>
                        </div>
                        <span class="bento-label">Headshots</span>
                    </div>
                    <div class="bento-item">
                        <div class="bento-bg photo-8">
                            <i class="fas fa-expand"></i>
                        </div>
                        <span class="bento-label">AI Enhancement</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="../js/components.js"></script>
    <script src="../js/script.js"></script>
</body>
</html>
