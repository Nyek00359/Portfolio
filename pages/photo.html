<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio - Graphic Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/photo.css">
</head>
<body>
    <!-- Main Content -->
    <main class="main-content">
        <!-- GRAPHIC DESIGN SECTION - Bento Theme -->
        <section class="tab-content active" id="photo">
            <div class="photo-section">
                <h2 class="section-title">Graphic Design Portfolio</h2>
                <div class="bento-grid">
                    <div class="bento-item large">
                        <div class="bento-bg photo-1">
                            <img src="../assets/img/photo/Photo Collage.png" alt="Photo Collage">
                        </div>
                        <span class="bento-label">Photo Collage</span>
                    </div>
                    <div class="bento-item">
                        <div class="bento-bg photo-2">
                            <img src="../assets/img/photo/Poster.png" alt="Poster">
                        </div>
                        <span class="bento-label">Poster</span>
                    </div>
                    <div class="bento-item tall">
                        <div class="bento-bg photo-3">
                            <img src="../assets/img/photo/Flyer.png" alt="Flyer">
                        </div>
                        <span class="bento-label">Flyer</span>
                    </div>
                    <div class="bento-item">
                        <div class="bento-bg photo-4">
                            <div class="carousel-container">
                                <img src="../assets/img/photo/Notebook.png" alt="Notebook" class="carousel-slide active">
                                <img src="../assets/img/photo/Notebook_CloseUp.png" alt="Notebook CloseUp" class="carousel-slide">
  
                            </div>
                        </div>
                        <span class="bento-label">Notebook</span>
                    </div>
                    <div class="bento-item">
                        <div class="bento-bg photo-5">
                            <div class="carousel-container">
                                <img src="../assets/img/photo/Trifolds_1.png" alt="Trifolds 1" class="carousel-slide active">
                                <img src="../assets/img/photo/Trifolds_2.png" alt="Trifolds 2" class="carousel-slide">

                            </div>
                        </div>
                        <span class="bento-label">Trifolds</span>
                    </div>
                </div>
                </div>
            </div>
        </section>
    </main>

    <script src="../js/components.js"></script>
    <script src="../js/script.js"></script>
</body>
</html>
